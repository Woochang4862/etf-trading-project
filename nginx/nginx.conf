events {
    worker_connections 1024;
}

http {
    # Docker 내장 DNS resolver (upstream 해석 실패 방지)
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream web-dashboard {
        server web-dashboard:3000;
    }

    upstream ml-service {
        server ml-service:8000;
    }

    upstream auto-monitoring {
        server auto-monitoring:3000;
    }

    upstream scraper-service {
        server scraper-service:8001;
    }

    server {
        listen 80;
        server_name ahnbi2.suwon.ac.kr;

        # 웹 대시보드
        location / {
            proxy_pass http://web-dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Trading Monitor 대시보드 (/trading)
        location /trading {
            set $trading_monitor_upstream http://etf-trading-monitor:3002;
            proxy_pass $trading_monitor_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Auto-Monitoring 대시보드 (/monitor)
        location /monitor {
            proxy_pass http://auto-monitoring;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Scraper API (/api/scraper/* routes to scraper-service)
        location /api/scraper/ {
            proxy_pass http://scraper-service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeout for streaming logs and long-running operations
            proxy_read_timeout 3600s;
            proxy_connect_timeout 60s;
            proxy_buffering off;
        }

        # Trading Service API (/api/trading/* routes to trading-service)
        # 변수를 사용하여 trading-service가 없어도 nginx 시작 가능
        location /api/trading/ {
            set $trading_upstream http://trading-service:8002;
            proxy_pass $trading_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ML Service API (/api/로 시작하는 요청을 ml-service로 전달)
        location /api/ {
            proxy_pass http://ml-service/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FastAPI 문서
        location /docs {
            proxy_pass http://ml-service/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /redoc {
            proxy_pass http://ml-service/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 헬스체크
        location /health {
            proxy_pass http://ml-service/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}

